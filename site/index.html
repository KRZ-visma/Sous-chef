<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sous-chef — Week plan</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        --border: color-mix(in srgb, CanvasText 18%, transparent);
        --surface: color-mix(in srgb, Canvas 92%, CanvasText 4%);
      }
      body {
        max-width: 44rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 650;
        letter-spacing: -0.02em;
        margin-bottom: 0.25rem;
      }
      .lede {
        margin-top: 0;
        color: color-mix(in srgb, CanvasText 72%, Canvas);
      }
      .week {
        margin-top: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .day-row {
        display: grid;
        grid-template-columns: 7.5rem 1fr;
        gap: 0.75rem;
        align-items: center;
        padding: 0.65rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
      }
      .day-label {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .day-row select {
        width: 100%;
        font: inherit;
        padding: 0.4rem 0.5rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: Canvas;
        color: CanvasText;
      }
      .toolbar {
        margin-top: 1.25rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      .toolbar button {
        font: inherit;
        padding: 0.45rem 0.85rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: Canvas;
        color: CanvasText;
        cursor: pointer;
      }
      .toolbar button:hover {
        filter: brightness(1.05);
      }
      .toolbar button:focus-visible {
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }
      .status {
        margin-top: 0.75rem;
        font-size: 0.9rem;
        color: color-mix(in srgb, CanvasText 65%, Canvas);
        min-height: 1.35em;
      }
      .error {
        color: #c42;
      }
      @media (prefers-color-scheme: dark) {
        .error {
          color: #f96;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Week plan</h1>
      <p class="lede">
        Pick a recipe for each day. Your plan is saved in this browser only
        (<code>localStorage</code>).
      </p>

      <div id="app">
        <p id="loading">Loading recipes…</p>
      </div>

      <div class="toolbar" id="toolbar" hidden>
        <button type="button" id="clear-plan">Clear week</button>
      </div>
      <p class="status" id="status" aria-live="polite"></p>
    </main>

    <script>
      (function () {
        const STORAGE_KEY = "sous-chef:week-plan:v1";
        const DAY_LABELS = [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
          "Sunday",
        ];

        /** @type {Record<string, object> | null} */
        let recipesById = null;

        function loadPlan() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return emptyPlan();
            const data = JSON.parse(raw);
            if (!data || !Array.isArray(data.slots)) return emptyPlan();
            const slots = data.slots.map(function (s) {
              return s === null || s === "" ? null : String(s);
            });
            while (slots.length < 7) slots.push(null);
            return { slots: slots.slice(0, 7) };
          } catch {
            return emptyPlan();
          }
        }

        function emptyPlan() {
          return { slots: new Array(7).fill(null) };
        }

        function savePlan(plan) {
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({ slots: plan.slots })
          );
        }

        function setStatus(message, isError) {
          const el = document.getElementById("status");
          el.textContent = message;
          el.className = "status" + (isError ? " error" : "");
        }

        function recipeOptionLabel(recipe) {
          var d = recipe.days;
          var suffix =
            typeof d === "number" && d > 0
              ? " — " + d + (d === 1 ? " day" : " days")
              : "";
          return recipe.name + suffix;
        }

        function renderWeek(recipes) {
          recipesById = {};
          for (var i = 0; i < recipes.length; i++) {
            recipesById[recipes[i].id] = recipes[i];
          }

          var app = document.getElementById("app");
          app.innerHTML = "";

          var plan = loadPlan();

          var week = document.createElement("div");
          week.className = "week";
          week.setAttribute("role", "list");

          for (var d = 0; d < 7; d++) {
            (function (dayIndex) {
              var row = document.createElement("div");
              row.className = "day-row";
              row.setAttribute("role", "listitem");

              var label = document.createElement("div");
              label.className = "day-label";
              label.textContent = DAY_LABELS[dayIndex];

              var select = document.createElement("select");
              select.setAttribute("aria-label", DAY_LABELS[dayIndex] + " meal");

              var emptyOpt = document.createElement("option");
              emptyOpt.value = "";
              emptyOpt.textContent = "— No recipe —";
              select.appendChild(emptyOpt);

              for (var r = 0; r < recipes.length; r++) {
                var rec = recipes[r];
                var opt = document.createElement("option");
                opt.value = rec.id;
                opt.textContent = recipeOptionLabel(rec);
                select.appendChild(opt);
              }

              var current = plan.slots[dayIndex];
              select.value = current && recipesById[current] ? current : "";

              select.addEventListener("change", function () {
                var pid = loadPlan();
                pid.slots[dayIndex] = select.value || null;
                savePlan(pid);
                setStatus("Week plan saved on this device.");
              });

              row.appendChild(label);
              row.appendChild(select);
              week.appendChild(row);
            })(d);
          }

          app.appendChild(week);
          document.getElementById("toolbar").hidden = false;
          setStatus("Week plan loaded. Changes save automatically.");

          document.getElementById("clear-plan").onclick = function () {
            savePlan(emptyPlan());
            renderWeek(recipes);
            setStatus("Week cleared.");
          };
        }

        function showError(message) {
          var app = document.getElementById("app");
          app.innerHTML =
            '<p class="error" role="alert">' +
            message.replace(/</g, "&lt;").replace(/>/g, "&gt;") +
            "</p>";
          setStatus("", false);
        }

        async function loadRecipes() {
          var indexRes = await fetch("data/recipes/_index.json");
          if (!indexRes.ok) {
            throw new Error("Could not load recipe list.");
          }
          var index = await indexRes.json();
          var ids = index.recipes;
          if (!Array.isArray(ids) || ids.length === 0) {
            throw new Error("Recipe list is empty.");
          }

          var recipes = [];
          for (var i = 0; i < ids.length; i++) {
            var id = ids[i];
            var path = "data/recipes/" + encodeURIComponent(id) + ".json";
            var res = await fetch(path);
            if (!res.ok) {
              throw new Error('Missing recipe file for "' + id + '".');
            }
            var recipe = await res.json();
            if (!recipe || recipe.id !== id) {
              throw new Error('Recipe id mismatch for "' + id + '".');
            }
            recipes.push(recipe);
          }

          recipes.sort(function (a, b) {
            return a.name.localeCompare(b.name, undefined, {
              sensitivity: "base",
            });
          });

          return recipes;
        }

        loadRecipes()
          .then(function (recipes) {
            renderWeek(recipes);
          })
          .catch(function (err) {
            console.error(err);
            showError(
              err && err.message
                ? err.message
                : "Something went wrong loading recipes."
            );
          });
      })();
    </script>
  </body>
</html>
